<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linnk Style - 실시간 AI RAG 분석 플랫폼</title>
    <!-- Google Fonts & Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Mermaid JS (For Mindmap visualization) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- Marked JS (For Markdown rendering) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-color: #080b11;
            --panel-bg: rgba(17, 24, 39, 0.6);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --sidebar-width: 450px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 40%);
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(8, 11, 17, 0.7);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-area i {
            font-size: 1.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .logo-area h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
        }

        .app-status.success i {
            color: var(--success-color);
        }

        .app-status.loading i {
            color: var(--accent-color);
            animation: spin 1s linear infinite;
        }

        /* Split View Layout */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* Left Side: Document / PDF Viewer Panel */
        .doc-panel {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border-color);
            background: rgba(10, 15, 26, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .viewer-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Initial Upload Screen inside Viewer */
        .upload-placeholder {
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            width: 80%;
            border: 2px dashed rgba(255, 255, 255, 0.12);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }

        .upload-placeholder:hover {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-placeholder i {
            font-size: 2.5rem;
            color: var(--text-secondary);
        }

        .upload-placeholder h4 {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .upload-placeholder p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        #file-input {
            display: none;
        }

        /* Native PDF Viewer Iframe */
        #pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* Right Side: Analysis & Workspace Panel */
        .analysis-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
        }

        /* Tab bar style */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 15, 26, 0.5);
            padding: 0 1rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            transition: color 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent-color);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
            box-shadow: 0 -2px 10px rgba(99, 102, 241, 0.5);
        }

        /* Tab Content Panel */
        .tab-content {
            flex: 1;
            display: none;
            overflow: hidden;
            position: relative;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Chat Tab Content */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 80%;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: var(--accent-color);
            color: white;
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
        }

        .bubble {
            padding: 0.75rem 1.15rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .bubble {
            background: var(--accent-color);
            color: white;
            border-top-right-radius: 0.2rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .message.assistant .bubble {
            background: var(--panel-bg);
            color: var(--text-primary);
            border-top-left-radius: 0.2rem;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .suggestions {
            padding: 0.5rem 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        .input-container {
            padding: 1.25rem 2rem;
            background: transparent;
        }

        .input-wrapper {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            padding: 0.4rem 0.6rem 0.4rem 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            padding: 0.4rem 0;
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Mindmap Tab Content */
        .mindmap-container {
            flex: 1;
            overflow: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .mindmap-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 5;
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .action-btn:hover {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .mermaid-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .mermaid svg {
            max-width: 100% !important;
            height: auto !important;
        }

        /* Report Tab Content */
        .report-container {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            background: rgba(10, 15, 26, 0.1);
        }

        .report-view {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            line-height: 1.7;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        /* Markdown elements inside report */
        .report-view h1 { font-size: 1.75rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .report-view h2 { font-size: 1.35rem; margin-top: 1.5rem; margin-bottom: 1rem; color: var(--accent-color); }
        .report-view h3 { font-size: 1.1rem; margin-top: 1rem; margin-bottom: 0.5rem; }
        .report-view p { margin-bottom: 1rem; color: #d1d5db; }
        .report-view ul, .report-view ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .report-view li { margin-bottom: 0.35rem; color: #d1d5db; }
        .report-view blockquote { border-left: 3px solid var(--accent-color); padding-left: 1rem; margin: 1rem 0; color: var(--text-secondary); font-style: italic; }

        /* General placeholder for Empty states */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: var(--text-secondary);
            text-align: center;
            height: 100%;
        }

        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
        }

        .empty-state button {
            margin-top: 0.5rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Layout resizer (Toggle PDF width) */
        .toggle-viewer-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .toggle-viewer-btn:hover {
            color: var(--text-primary);
        }

        .workspace.collapsed-pdf .doc-panel {
            width: 0;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo-area">
            <i class="fa-solid fa-brain"></i>
            <h1>Linnk AI RAG</h1>
        </div>
        <div class="app-status" id="app-status">
            <i class="fa-solid fa-circle-check"></i>
            <span>상태: 대기 중</span>
        </div>
    </header>

    <!-- Workspace -->
    <div class="workspace" id="workspace">
        
        <!-- Left Side: PDF Viewer -->
        <div class="doc-panel" id="doc-panel">
            <div class="panel-header">
                <span>📄 문서 원본 파일</span>
                <button class="toggle-viewer-btn" onclick="togglePdfViewer()"><i class="fa-solid fa-angles-left"></i> 닫기</button>
            </div>
            <div class="viewer-container">
                <!-- Drop file placeholder -->
                <div class="upload-placeholder" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <h4>분석할 파일을 이곳에 올려주세요</h4>
                    <p>PDF, 이미지 및 마이크로소프트 오피스 파일을 드래그하거나 클릭하여 로드합니다.</p>
                    <input type="file" id="file-input" accept=".pdf, .jpg, .jpeg, .png, .bmp, .tiff, .docx, .xlsx, .pptx, .html">
                </div>
                <!-- Native Iframe Viewer for PDF -->
                <iframe id="pdf-viewer"></iframe>
            </div>
        </div>

        <!-- Right Side: Analysis Panel -->
        <div class="analysis-panel">
            <!-- Tabs Menu -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab(event, 'tab-chat')">
                    <i class="fa-solid fa-comments"></i> AI 챗봇
                </button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-mindmap')">
                    <i class="fa-solid fa-circle-nodes"></i> 구조 마인드맵
                </button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-report')">
                    <i class="fa-solid fa-file-invoice"></i> 비즈니스 보고서
                </button>
            </div>

            <!-- Tab Content: Chat -->
            <div class="tab-content active" id="tab-chat">
                <div class="chat-container">
                    <div class="messages-container" id="messages-container">
                        <div class="message assistant">
                            <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                            <div class="bubble">안녕하세요! 왼쪽에 분석하고 싶은 문서를 마우스로 끌어다 놓으세요. 분석 완료 후 RAG 기반으로 다양한 시각화와 보고서가 생성됩니다.</div>
                        </div>
                    </div>
                    
                    <div class="suggestions" id="suggestions-area" style="display: none;">
                        <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                            📝 핵심 내용 3줄 요약
                        </div>
                        <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                            🎯 주요 업무 및 자격 요건
                        </div>
                        <div class="suggestion-chip" onclick="askSuggestion(this.innerText)">
                            🎁 우대사항 및 특이사항
                        </div>
                    </div>

                    <div class="input-container">
                        <div class="input-wrapper">
                            <input type="text" id="chat-input" placeholder="문서에 관해 물어보세요..." disabled>
                            <button class="send-btn" id="send-btn" disabled>
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Content: Mindmap -->
            <div class="tab-content" id="tab-mindmap">
                <div class="mindmap-container" id="mindmap-container">
                    <!-- Actions -->
                    <div class="mindmap-actions" id="mindmap-actions" style="display: none;">
                        <button class="action-btn" onclick="generateMindmap()">
                            <i class="fa-solid fa-arrows-rotate"></i> 다시 생성
                        </button>
                    </div>

                    <!-- Render Area -->
                    <div class="mermaid-wrapper">
                        <div class="mermaid" id="mermaid-render-area"></div>
                    </div>

                    <!-- Empty State -->
                    <div class="empty-state" id="mindmap-empty">
                        <i class="fa-solid fa-circle-nodes"></i>
                        <p>문서 업로드 완료 시, 내용을 계층 구조의 마인드맵으로 시각화합니다.</p>
                        <button class="action-btn" id="mindmap-gen-btn" disabled onclick="generateMindmap()">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 마인드맵 생성
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tab Content: Report -->
            <div class="tab-content" id="tab-report">
                <div class="report-container" id="report-container">
                    
                    <!-- Empty State -->
                    <div class="empty-state" id="report-empty">
                        <i class="fa-solid fa-file-invoice"></i>
                        <p>문서 정보를 구조화하여 전문적인 보고서 양식으로 요약 생성합니다.</p>
                        <button class="action-btn" id="report-gen-btn" disabled onclick="generateReport()">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> 보고서 초안 생성
                        </button>
                    </div>

                    <!-- Report Output -->
                    <div class="report-view" id="report-view" style="display: none;"></div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // Mermaid Initialization
        mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

        // Global State variables
        let documentText = "";
        let chatHistory = [];
        let mindmapGenerated = false;
        let reportGenerated = false;

        // UI Selectors
        const workspace = document.getElementById('workspace');
        const docPanel = document.getElementById('doc-panel');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const pdfViewer = document.getElementById('pdf-viewer');
        const appStatus = document.getElementById('app-status');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('messages-container');
        const suggestionsArea = document.getElementById('suggestions-area');
        
        // Tab elements
        const mindmapGenBtn = document.getElementById('mindmap-gen-btn');
        const mindmapEmpty = document.getElementById('mindmap-empty');
        const mindmapActions = document.getElementById('mindmap-actions');
        const mermaidRenderArea = document.getElementById('mermaid-render-area');

        const reportGenBtn = document.getElementById('report-gen-btn');
        const reportEmpty = document.getElementById('report-empty');
        const reportView = document.getElementById('report-view');

        // Toggle PDF View
        const togglePdfViewer = () => {
            workspace.classList.toggle('collapsed-pdf');
        };

        // Tab Switching Logic
        const switchTab = (evt, tabId) => {
            // Remove active classes
            const tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            const tabcontent = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }

            // Add active class
            evt.currentTarget.classList.add("active");
            document.getElementById(tabId).classList.add("active");

            // 만약 PDF 뷰어가 닫혀있고 마인드맵이나 보고서 탭을 열면, 자동으로 PDF 뷰어를 열어 듀얼 모드로 만들어 줌
            if (tabId !== 'tab-chat' && workspace.classList.contains('collapsed-pdf')) {
                workspace.classList.remove('collapsed-pdf');
            }
        };

        // File Uploader Handling
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // OCR Handler
        const handleFile = async (file) => {
            appStatus.className = "app-status loading";
            appStatus.innerHTML = `<i class="fa-solid fa-circle-notch"></i> <span>상태: 문서 OCR 분석 중...</span>`;
            
            // PDF 원본 뷰어 띄우기 (URL 생성)
            if (file.type === "application/pdf") {
                const fileURL = URL.createObjectURL(file);
                pdfViewer.src = fileURL;
                pdfViewer.style.display = "block";
                dropZone.style.display = "none";
            }

            try {
                const fileBytes = await file.arrayBuffer();

                // Call secure Cloudflare Pages Function (Azure OCR)
                const ocrResponse = await fetch("/api/ocr", {
                    method: 'POST',
                    body: fileBytes
                });

                const ocrResult = await ocrResponse.json();

                if (!ocrResponse.ok) {
                    throw new Error(ocrResult.error || `OCR 제출 실패 (코드: ${ocrResponse.status})`);
                }

                documentText = ocrResult.content || "";

                // Reset Status
                appStatus.className = "app-status success";
                appStatus.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>상태: 분석 완료 (${documentText.length} 자)</span>`;

                // Enable Chat Inputs
                chatInput.disabled = false;
                sendBtn.disabled = false;
                suggestionsArea.style.display = "flex";

                // Enable Tab Generation Buttons
                mindmapGenBtn.disabled = false;
                reportGenBtn.disabled = false;

                addMessage("assistant", `문서 적재 및 OCR 분석이 완료되었습니다. 이제 다음 작업이 가능합니다:\n1. 💬 챗봇 질답\n2. 🌿 구조 마인드맵 시각화 생성\n3. 📋 정형 보고서 초안 생성`);

            } catch (err) {
                console.error(err);
                appStatus.className = "app-status";
                appStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:var(--danger-color)"></i> <span>오류: 분석 실패</span>`;
                alert(`오류 발생: ${err.message}`);
            }
        };

        // Chat UI helpers
        const addMessage = (role, text) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        // LLM Request Proxy Call
        const askQuestion = async (userQuery) => {
            if (!documentText) {
                alert("먼저 파일을 업로드해 주세요.");
                return;
            }

            addMessage("user", userQuery);
            chatHistory.push({ role: "user", content: userQuery });
            
            chatInput.value = "";
            chatInput.disabled = true;
            sendBtn.disabled = true;

            const loadingMsgDiv = document.createElement('div');
            loadingMsgDiv.className = 'message assistant';
            loadingMsgDiv.innerHTML = `
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble"><i class="fa-solid fa-circle-notch spinner"></i> 답변을 구성하는 중...</div>
            `;
            messagesContainer.appendChild(loadingMsgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const systemPrompt = `당신은 제공된 문서를 바탕으로 사용자의 질문에 답하는 비서입니다.
아래 [참조 문서 내용]을 바탕으로 사용자의 질문에 친절하고 상세하게 답변해 주세요.

[답변 규칙]
1. 반드시 한국어로 답변해 주세요.
2. 문서에 명시되지 않은 정보는 억지로 지어내지 말고, 솔직하게 "제공된 문서 내용에서는 해당 정보를 찾을 수 없습니다."라고 답변해 주세요.
3. 문서의 텍스트에 기반하여 팩트 위주로 대답해 주세요.

[참조 문서 내용]
${documentText}`;

                const messagesPayload = [
                    { role: "system", content: systemPrompt }
                ];
                
                const lastHistory = chatHistory.slice(-6);
                lastHistory.forEach(h => messagesPayload.push(h));

                const response = await fetch("/api/chat", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messagesPayload
                    })
                });

                const resData = await response.json();

                if (!response.ok) {
                    throw new Error(resData.error || `AI 통신 에러 (코드: ${response.status})`);
                }

                const aiAnswer = resData.choices[0].message.content;

                messagesContainer.removeChild(loadingMsgDiv);
                addMessage("assistant", aiAnswer);
                chatHistory.push({ role: "assistant", content: aiAnswer });

            } catch (err) {
                console.error(err);
                messagesContainer.removeChild(loadingMsgDiv);
                addMessage("assistant", `오류가 발생했습니다: ${err.message}`);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        };

        // Suggested Question Handler
        window.askSuggestion = (fullText) => {
            const cleanText = fullText.replace(/^[^\w가-힣]+/, "").trim();
            askQuestion(cleanText);
        };

        sendBtn.addEventListener('click', () => {
            const query = chatInput.value.trim();
            if (query) askQuestion(query);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const query = chatInput.value.trim();
                if (query) askQuestion(query);
            }
        });

        // 🌿 Mindmap Generation (Uses Mermaid.js syntax)
        const generateMindmap = async () => {
            if (!documentText) return;

            mindmapEmpty.innerHTML = `<i class="fa-solid fa-circle-notch spinner" style="font-size:3rem;"></i><p>문서 요약 마인드맵 분석 및 그리는 중...</p>`;
            mindmapGenBtn.disabled = true;

            try {
                const mindmapPrompt = `제공된 문서 내용을 기반으로 핵심 정보를 구조화한 Mermaid.js 마인드맵(mindmap) 코드를 생성해 주세요.
반드시 마인드맵 코드만 출력해야 하며, 다른 텍스트 설명이나 마크다운 펜스(\`\`\`) 등은 일절 적지 마세요.

[문서 내용]
${documentText}

[출력 양식 예시]
mindmap
  root((핵심 주제))
    핵심주제1
      세부개념1_1
      세부개념1_2
    핵심주제2
      세부개념2_1`;

                const response = await fetch("/api/chat", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "당신은 구조 시각화용 Mermaid 마인드맵 코드 자동 작성기입니다." },
                            { role: "user", content: mindmapPrompt }
                        ]
                    })
                });

                const resData = await response.json();
                if (!response.ok) throw new Error(resData.error);

                let rawMermaidCode = resData.choices[0].message.content.trim();
                
                // 마크다운 백틱 문법(\`\`\`mermaid)이 씌워져서 오는 경우를 대비한 가공 처리
                rawMermaidCode = rawMermaidCode.replace(/```mermaid/gi, "").replace(/```/g, "").trim();

                // Clean Mindmap Render Area
                mermaidRenderArea.innerHTML = "";
                mermaidRenderArea.removeAttribute('data-processed');
                
                // Render with Mermaid Engine
                const { svg } = await mermaid.render('mindmap-svg', rawMermaidCode);
                mermaidRenderArea.innerHTML = svg;

                mindmapEmpty.style.display = "none";
                mindmapActions.style.display = "flex";
                mindmapGenerated = true;

            } catch (err) {
                console.error(err);
                mindmapEmpty.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation" style="color:var(--danger-color); font-size:3rem;"></i>
                    <p>마인드맵 시각화에 실패했습니다: ${err.message}</p>
                    <button class="action-btn" onclick="generateMindmap()"><i class="fa-solid fa-arrows-rotate"></i> 다시 시도</button>
                `;
            }
        };

        // 📋 Professional Report Generation (Uses Marked.js to parse Markdown response)
        const generateReport = async () => {
            if (!documentText) return;

            reportEmpty.innerHTML = `<i class="fa-solid fa-circle-notch spinner" style="font-size:3rem;"></i><p>문서를 심층 요약하여 격식 있는 보고서로 정밀 구성하는 중...</p>`;
            reportGenBtn.disabled = true;

            try {
                const reportPrompt = `제공된 문서의 내용을 격식 있고 전문적인 비즈니스 보고서(Markdown 형식)로 완전하게 재구성해 주세요.

[요구사항]
- 1. 개요 및 목적, 2. 핵심 분석 요약, 3. 결론 및 향후 전망 순으로 자세하게 작성해 주세요.
- 가독성이 높도록 리스트, 표(Table) 또는 인용구(Blockquote) 문법을 적극 활용해 주세요.
- 반드시 한국어로 논리 정연하게 작성해 주세요.

[문서 내용]
${documentText}`;

                const response = await fetch("/api/chat", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "당신은 전문적인 비즈니스 보고서 작성 컨설턴트입니다." },
                            { role: "user", content: reportPrompt }
                        ]
                    })
                });

                const resData = await response.json();
                if (!response.ok) throw new Error(resData.error);

                const rawReportMarkdown = resData.choices[0].message.content;

                // Parse markdown into HTML and inject
                reportView.innerHTML = marked.parse(rawReportMarkdown);
                
                reportEmpty.style.display = "none";
                reportView.style.display = "block";
                reportGenerated = true;

            } catch (err) {
                console.error(err);
                reportEmpty.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation" style="color:var(--danger-color); font-size:3rem;"></i>
                    <p>보고서 생성에 실패했습니다: ${err.message}</p>
                    <button class="action-btn" onclick="generateReport()"><i class="fa-solid fa-arrows-rotate"></i> 다시 시도</button>
                `;
            }
        };
    </script>
</body>
</html>
